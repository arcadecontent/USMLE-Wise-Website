  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   --font-display: \"Source Serif 4\", Georgia, serif;\n      --font-mono:    \"JetBrains Mono\", monospace;\n    }\n\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    body {\n      font-family: var(--font-sans);\n      background: var(--uw-bg);\n      color: var(--uw-ink-800);\n    }\n\n    .wrap {\n      width: 100%;\n      max-width: 1180px;\n      margin-inline: auto;\n      padding-inline: clamp(24px, 5vw, 64px);\n    }\n\n    /* ── Page intro ── */\n    .page-intro {\n      padding-block: clamp(64px, 8vw, 112px);\n      border-bottom: 1px solid var(--uw-border);\n    }\n    .eyebrow {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: .17em;\n      text-transform: uppercase;\n      color: var(--uw-blue-500);\n      display: block;\n      margin-bottom: 16px;\n    }\n    .page-intro h2 {\n      font-family: var(--font-display);\n      font-size: clamp(32px, 4vw, 52px);\n      font-weight: 400;\n      line-height: 1.08;\n      letter-spacing: -.024em;\n      color: var(--uw-ink-900);\n      margin-bottom: 14px;\n      max-width: 20ch;\n    }\n    .page-intro p {\n      font-size: clamp(15px, 1.3vw, 17px);\n      line-height: 1.7;\n      color: var(--uw-ink-500);\n      max-width: 52ch;\n    }\n\n\n    /* ════════════════════════════\n       ROTATION SECTION\n    ════════════════════════════ */\n    .rot {\n      padding-block: clamp(72px, 9vw, 120px);\n      border-bottom: 1px solid var(--uw-border);\n    }\n\n    /* ── 1. TOP META ── */\n    .rot__meta {\n      display: flex;\n      align-items: center;\n      gap: 16px;\n      margin-bottom: clamp(32px, 4vw, 48px);\n    }\n    .rot__num {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: .16em;\n      text-transform: uppercase;\n      color: var(--uw-blue-500);\n    }\n    .rot__meta-div {\n      width: 1px;\n      height: 12px;\n      background: var(--uw-ink-200);\n      flex-shrink: 0;\n    }\n    .rot__loc {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: .1em;\n      text-transform: uppercase;\n      color: var(--uw-ink-400);\n    }\n    .rot__specialty {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: .1em;\n      text-transform: uppercase;\n      color: var(--uw-ink-400);\n    }\n\n    /* ── 2. TITLE ROW ── */\n    .rot__title-row {\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n      gap: clamp(32px, 5vw, 64px);\n      margin-bottom: 16px;\n    }\n    .rot__title {\n      font-family: var(--font-display);\n      font-size: clamp(36px, 5vw, 68px);\n      font-weight: 400;\n      line-height: 1.04;\n      letter-spacing: -.028em;\n      color: var(--uw-ink-900);\n    }\n    .rot__price-block {\n      flex-shrink: 0;\n      display: flex;\n      flex-direction: column;\n      align-items: flex-end;\n      gap: 8px;\n      padding-bottom: 6px;\n    }\n    .rot__price {\n      font-family: var(--font-display);\n      font-size: clamp(36px, 4vw, 52px);\n      font-weight: 600;\n      color: var(--uw-ink-900);\n      line-height: 1;\n      letter-spacing: -.03em;\n    }\n    .rot__deposit {\n      font-family: var(--font-mono);\n      font-size: 10px;\n      letter-spacing: .04em;\n      color: var(--uw-ink-400);\n      text-align: right;\n      line-height: 1.6;\n    }\n    .rot__cta {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      font-family: var(--font-sans);\n      font-size: 13.5px;\n      font-weight: 600;\n      letter-spacing: -.01em;\n      color: #fff;\n      background: var(--uw-ink-900);\n      padding: 11px 26px;\n      border-radius: 8px;\n      text-decoration: none;\n      transition: background .15s;\n      margin-top: 4px;\n    }\n    .rot__cta:hover { background: var(--uw-blue-500); }\n\n    /* ── 3. HOSPITAL + SETTING ── */\n    .rot__hospital {\n      font-size: clamp(14px, 1.2vw, 16px);\n      color: var(--uw-ink-500);\n      line-height: 1.5;\n      margin-bottom: 12px;\n    }\n    .rot__setting {\n      font-family: var(--font-mono);\n      font-size: 10.5px;\n      letter-spacing: .1em;\n      text-transform: uppercase;\n      color: var(--uw-ink-500);\n    }\n\n    /* ── 4. STATS STRIP ── */\n    .rot__rule { height: 1px; background: var(--uw-border); margin-block: clamp(32px, 4vw, 52px); }\n\n    .rot__stats {\n      display: flex;\n      gap: 0;\n    }\n    .rot__stat {\n      flex: 1;\n      display: flex;\n      flex-direction: column;\n      gap: 7px;\n      padding-right: clamp(24px, 3vw, 48px);\n      border-right: 1px solid var(--uw-border);\n      margin-right: clamp(24px, 3vw, 48px);\n    }\n    .rot__stat:last-child {\n      border-right: none;\n      margin-right: 0;\n      padding-right: 0;\n    }\n    .rot__stat-val {\n      font-family: var(--font-display);\n      font-size: clamp(28px, 3.2vw, 44px);\n      font-weight: 400;\n      color: var(--uw-ink-900);\n      line-height: 1;\n      letter-spacing: -.025em;\n    }\n    .rot__stat-label {\n      font-family: var(--font-mono);\n      font-size: 10px;\n      letter-spacing: .14em;\n      text-transform: uppercase;\n      color: var(--uw-ink-400);\n    }\n\n    /* ── 5. BODY ── */\n    .rot__body {\n      display: grid;\n      grid-template-columns: 1fr 380px;\n      gap: clamp(48px, 6vw, 96px);\n      align-items: start;\n    }\n\n    /* Content col */\n    .rot__content {\n      display: flex;\n      flex-direction: column;\n      gap: clamp(32px, 4vw, 48px);\n    }\n\n    .rot__section-label {\n      font-family: var(--font-mono);\n      font-size: 10px;\n      letter-spacing: .17em;\n      text-transform: uppercase;\n      color: var(--uw-ink-400);\n      display: block;\n      margin-bottom: 16px;\n    }\n\n    .rot__list {\n      list-style: none;\n      padding: 0;\n      margin: 0;\n      display: flex;\n      flex-direction: column;\n      gap: 11px;\n    }\n    .rot__list li {\n      font-size: clamp(14px, 1.2vw, 15px);\n      color: var(--uw-ink-700);\n      line-height: 1.65;\n      display: flex;\n      gap: 14px;\n      align-items: flex-start;\n    }\n    .rot__list li::before {\n      content: \"\";\n      width: 4px;\n      height: 4px;\n      border-radius: 50%;\n      background: var(--uw-blue-400);\n      flex-shrink: 0;\n      margin-top: 9px;\n    }\n\n    /* Aside col */\n    .rot__aside {\n      display: flex;\n      flex-direction: column;\n      gap: clamp(32px, 4vw, 48px);\n      position: sticky;\n      top: 48px;\n    }\n\n    /* LOR */\n    .rot__lor {\n      padding-left: 20px;\n      border-left: 2px solid var(--uw-blue-400);\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n    }\n    .rot__lor-eyebrow {\n      font-family: var(--font-mono);\n      font-size: 10px;\n      letter-spacing: .15em;\n      text-transform: uppercase;\n      color: var(--uw-blue-500);\n      display: flex;\n      align-items: center;\n      gap: 7px;\n    }\n    .rot__lor-title {\n      font-family: var(--font-display);\n      font-size: clamp(20px, 2.2vw, 28px);\n      font-weight: 400;\n      color: var(--uw-ink-900);\n      line-height: 1.2;\n      letter-spacing: -.018em;\n    }\n    .rot__lor-text {\n      font-size: 14px;\n      color: var(--uw-ink-500);\n      line-height: 1.7;\n    }\n\n    /* Docs */\n    .rot__docs {\n      display: flex;\n      flex-direction: column;\n      gap: 14px;\n    }\n    .rot__docs-list {\n      list-style: none;\n      padding: 0;\n      margin: 0;\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n    }\n    .rot__docs-list li {\n      font-size: 14px;\n      color: var(--uw-ink-600);\n      line-height: 1.5;\n      padding-left: 16px;\n      position: relative;\n    }\n    .rot__docs-list li::before {\n      content: \"—\";\n      position: absolute;\n      left: 0;\n      color: var(--uw-ink-300);\n      font-size: 13px;\n    }\n\n    /* ── Responsive ── */\n    @media (max-width: 900px) {\n      .rot__title-row { flex-direction: column; align-items: flex-start; gap: 28px; }\n      .rot__price-block { align-items: flex-start; flex-direction: row; align-items: center; flex-wrap: wrap; gap: 20px; }\n      .rot__deposit { text-align: left; }\n      .rot__stats { flex-wrap: wrap; }\n      .rot__stat { flex: 0 0 calc(50% - 24px); min-width: 120px; }\n      .rot__body { grid-template-columns: 1fr; }\n      .rot__aside { position: static; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <!-- Page intro (untouched) -->\n  <div class=\"page-intro\">\n    <div class=\"wrap\">\n      <span class=\"eyebrow\">Available placements<\u002Fspan>\n      <h2>Rotations that open doors.<br>Not just fill weeks.<\u002Fh2>\n      <p>Four IMG-friendly placements with hospital letterhead LORs, monthly starts, and full clinical exposure.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ROTATION 01 — AS A PAGE SECTION -->\n  <section class=\"rot\" aria-labelledby=\"rot-title\">\n    <div class=\"wrap\">\n\n      <!-- Meta -->\n      <div class=\"rot__meta\">\n        <span class=\"rot__num\">Rotation 01<\u002Fspan>\n        <div class=\"rot__meta-div\" aria-hidden=\"true\"><\u002Fdiv>\n        <span class=\"rot__loc\">\n          <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 16 0Z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n          McAllen, Texas\n        <\u002Fspan>\n        <div class=\"rot__meta-div\" aria-hidden=\"true\"><\u002Fdiv>\n        <span class=\"rot__specialty\">Internal Medicine<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Title row -->\n      <div class=\"rot__title-row\">\n        <h2 id=\"rot-title\" class=\"rot__title\">Internal Medicine<br>Sub-Internship<\u002Fh2>\n        <div class=\"rot__price-block\">\n          <div class=\"rot__price\">$3,500<\u002Fdiv>\n          <p class=\"rot__deposit\">$500 deposit toward total<br>Balance due before start<\u002Fp>\n          <a class=\"rot__cta\" href=\"https://team.manikmadaan.com/guidance-call/book\" target=\"_blank\" rel=\"noopener\">Book a Call<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Hospital + setting -->\n      <p class=\"rot__hospital\">South Texas Health System — DHR Health &amp; Cornerstone Regional Medical Center<\u002Fp>\n      <span class=\"rot__setting\">Inpatient Sub-I &nbsp;·&nbsp; Active IM Residency Environment<\u002Fspan>\n\n      <!-- Rule -->\n      <div class=\"rot__rule\" aria-hidden=\"true\"><\u002Fdiv>\n\n      <!-- Stats -->\n      <div class=\"rot__stats\" aria-label=\"Key facts\">\n        <div class=\"rot__stat\">\n          <span class=\"rot__stat-val\">4<\u002Fspan>\n          <span class=\"rot__stat-label\">Weeks<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"rot__stat\">\n          <span class=\"rot__stat-val\">3<\u002Fspan>\n          <span class=\"rot__stat-label\">Max students<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"rot__stat\">\n          <span class=\"rot__stat-val\">Monthly<\u002Fspan>\n          <span class=\"rot__stat-label\">Starts<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"rot__stat\">\n          <span class=\"rot__stat-val\">Inpatient<\u002Fspan>\n          <span class=\"rot__stat-label\">Setting<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Rule -->\n      <div class=\"rot__rule\" aria-hidden=\"true\"><\u002Fdiv>\n\n      <!-- Body -->\n      <div class=\"rot__body\">\n\n        <!-- Left: content -->\n        <div class=\"rot__content\">\n\n          <div>\n            <span class=\"rot__section-label\">About the rotation<\u002Fspan>\n            <ul class=\"rot__list\">\n              <li>4-week intensive inpatient experience at a respected South Texas institution with an active IM Residency Program.<\u002Fli>\n              <li>Work directly under an experienced internist affiliated with South Texas Health System.<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n\n          <div>\n            <span class=\"rot__section-label\">What you will gain<\u002Fspan>\n            <ul class=\"rot__list\">\n              <li>Hands-on experience in a busy inpatient setting.<\u002Fli>\n              <li>Active participation in daily rounds &amp; treatment planning.<\u002Fli>\n              <li>Manage patient care from admission to discharge.<\u002Fli>\n              <li>Present patient cases directly to the attending physician.<\u002Fli>\n              <li>Development of skills in initial assessments &amp; management plans.<\u002Fli>\n              <li>Maximum exposure with only 3 students per rotation.<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n\n          <div>\n            <span class=\"rot__section-label\">Additional benefits<\u002Fspan>\n            <ul class=\"rot__list\">\n              <li>Prestigious teaching environment with residency exposure.<\u002Fli>\n              <li>Strong CV &amp; Match application booster.<\u002Fli>\n              <li>Guidance for nearby accommodation available.<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Right: LOR + docs -->\n        <div class=\"rot__aside\">\n\n          <div class=\"rot__lor\">\n            <span class=\"rot__lor-eyebrow\">\n              <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg>\n              Included — Letter of Recommendation\n            <\u002Fspan>\n            <h3 class=\"rot__lor-title\">Official hospital<br>letterhead LoR<\u002Fh3>\n            <p class=\"rot__lor-text\">Personalized, highly detailed letter upon successful completion — highlighting your clinical performance and contributions to the team.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"rot__docs\">\n            <span class=\"rot__section-label\">Required documents<\u002Fspan>\n            <ul class=\"rot__docs-list\">\n              <li>Updated CV<\u002Fli>\n              <li>AAMC Standardized Immunization Records<\u002Fli>\n              <li>Medical School Transcript or ID<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
